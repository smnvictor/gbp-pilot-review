name: gbp-pilot-review-prod

# ============================================================================
# Réseaux : séparation publique / interne pour défense en profondeur
# ============================================================================
networks:
  # Public : seul Caddy y est, expose 80/443 au monde
  public:
    driver: bridge
  # Internal : tous les services backend, invisible depuis l'extérieur
  internal:
    driver: bridge
    internal: false  # false car les containers ont besoin d'internet sortant
                     # (API Google, Claude, Lemon Squeezy, Resend...)

# ============================================================================
# Volumes persistants : survivent aux restarts de containers
# ============================================================================
volumes:
  pgdata:        # données Postgres
  redisdata:     # AOF Redis (persistence)
  caddy-data:    # certifs, etc. (même si on utilise origin cert, garde le state)
  caddy-config:  # config runtime Caddy

# ============================================================================
# Configuration commune réutilisée par tous les services Python
# ============================================================================
x-app-base: &app-base
  build:
    context: ./backend
    dockerfile: Dockerfile
  image: gbp-pilot-review-backend:latest
  env_file:
    - .env
  restart: unless-stopped
  networks: [internal]
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

x-worker-base: &worker-base
  <<: *app-base
  # Override du healthcheck : pas de port HTTP exposé sur les workers
  healthcheck:
    test: ["CMD-SHELL", "celery -A app.celery_app inspect ping -d celery@$$HOSTNAME --timeout=5 || exit 1"]
    interval: 60s
    timeout: 10s
    retries: 3
    start_period: 30s

services:
  # --------------------------------------------------------------------------
  # Postgres : DB principale
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gbp_pilot_review}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks: [internal]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-gbp_pilot_review}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --------------------------------------------------------------------------
  # Redis : broker Celery + cache
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
      - --maxmemory
      - 512mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redisdata:/data
    networks: [internal]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --------------------------------------------------------------------------
  # API : FastAPI + uvicorn (non exposée directement, derrière Caddy)
  # --------------------------------------------------------------------------
  api:
    <<: *app-base
    networks: [internal]
    # Pas de "ports:" → l'API n'est joignable que via Caddy sur le réseau interne

  # --------------------------------------------------------------------------
  # Workers Celery — un par queue pour isolation des charges
  # --------------------------------------------------------------------------
  worker-default:
    <<: *worker-base
    command: ["celery", "-A", "app.celery_app", "worker", "-Q", "default", "-l", "info", "--concurrency=2"]

  worker-polling:
    <<: *worker-base
    command: ["celery", "-A", "app.celery_app", "worker", "-Q", "polling", "-l", "info", "--concurrency=2"]

  worker-generation:
    <<: *worker-base
    command: ["celery", "-A", "app.celery_app", "worker", "-Q", "generation", "-l", "info", "--concurrency=2"]

  worker-publication:
    <<: *worker-base
    command: ["celery", "-A", "app.celery_app", "worker", "-Q", "publication", "-l", "info", "--concurrency=2"]

  worker-notification:
    <<: *worker-base
    command: ["celery", "-A", "app.celery_app", "worker", "-Q", "notification", "-l", "info", "--concurrency=2"]

  # --------------------------------------------------------------------------
  # Celery Beat : scheduler des tâches périodiques
  # --------------------------------------------------------------------------
  beat:
    <<: *worker-base
    command: ["celery", "-A", "app.celery_app", "beat", "-l", "info", "--schedule=/tmp/celerybeat-schedule"]
    healthcheck:
      # Vérifie que le schedule file est mis à jour récemment (beat le touche périodiquement)
      test: ["CMD-SHELL", "test -f /tmp/celerybeat-schedule && find /tmp/celerybeat-schedule -mmin -2 | grep -q . || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s

  # --------------------------------------------------------------------------
  # Caddy : reverse proxy, le SEUL service exposé publiquement
  # --------------------------------------------------------------------------
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - /etc/caddy:/etc/caddy/certs:ro   # contient origin.pem et origin.key
      - caddy-data:/data
      - caddy-config:/config
    networks: [public, internal]
    depends_on:
      - api
